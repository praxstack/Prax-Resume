<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- Reusable skill-category icon sprite. Stroke-based, 24x24, currentColor.
       Use in HTML: <svg class="ico"><use href="assets/svg/skill-icons.svg#ico-java"/></svg>
       (or inline the symbols). Designed to read at 16-20px. -->

  <!-- Java & JVM — coffee/steam + thread bars -->
  <symbol id="ico-java" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 11h11v4a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3z"/>
    <path d="M16 12h1.5a2 2 0 0 1 0 4H16"/>
    <path d="M8.5 7c.8-1 .2-1.8-.2-2.6M11.5 7c.8-1 .2-1.8-.2-2.6"/>
  </symbol>

  <!-- Distributed systems — interconnected nodes -->
  <symbol id="ico-dist" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="6" r="2.2"/><circle cx="18" cy="6" r="2.2"/>
    <circle cx="12" cy="18" r="2.2"/>
    <path d="M7.8 7.4 10.6 16M16.2 7.4 13.4 16M8.2 6h7.6"/>
  </symbol>

  <!-- AWS / Cloud — cloud + stacked layers -->
  <symbol id="ico-aws" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 15a3.2 3.2 0 0 1 .3-6.4 4.2 4.2 0 0 1 8 .9A2.9 2.9 0 0 1 15 15z"/>
    <path d="M8 18.5h8M9.5 21h5"/>
  </symbol>

  <!-- Front-end — code brackets + component frame -->
  <symbol id="ico-fe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3.5" y="4.5" width="17" height="15" rx="2"/>
    <path d="M3.5 8.5h17"/>
    <path d="M9.5 12.5 8 14l1.5 1.5M14.5 12.5 16 14l-1.5 1.5"/>
  </symbol>

  <!-- Data & storage — database cylinder -->
  <symbol id="ico-data" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="12" cy="6" rx="7" ry="2.6"/>
    <path d="M5 6v12c0 1.4 3.1 2.6 7 2.6s7-1.2 7-2.6V6"/>
    <path d="M5 12c0 1.4 3.1 2.6 7 2.6s7-1.2 7-2.6"/>
  </symbol>

  <!-- Other languages — terminal prompt -->
  <symbol id="ico-lang" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3.5" y="4.5" width="17" height="15" rx="2"/>
    <path d="M7 9l3 2.5L7 14M12.5 14.5h4.5"/>
  </symbol>

  <!-- Tooling & process — gear + flow -->
  <symbol id="ico-tool" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 4.5v2M12 17.5v2M4.5 12h2M17.5 12h2M6.7 6.7l1.4 1.4M15.9 15.9l1.4 1.4M17.3 6.7l-1.4 1.4M8.1 15.9l-1.4 1.4"/>
  </symbol>
</svg>
