<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 12" role="img" aria-label="Section divider" preserveAspectRatio="none">
  <defs>
    <linearGradient id="divFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#8C2B12" stop-opacity="0.9"/>
      <stop offset="0.12" stop-color="#D4A27F" stop-opacity="0.7"/>
      <stop offset="0.5"  stop-color="#D8D0C0" stop-opacity="0.5"/>
      <stop offset="1"    stop-color="#D8D0C0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- rust seed square -> clay -> hairline fade: a directional rule, not a flat line -->
  <rect x="0" y="5" width="600" height="1.4" fill="url(#divFade)"/>
  <rect x="0" y="3" width="7" height="6" rx="1" fill="#8C2B12"/>
</svg>
